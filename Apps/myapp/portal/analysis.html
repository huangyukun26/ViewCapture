<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WindowView Semantic Analysis</title>
  <link rel="stylesheet" href="/Apps/myapp/portal/styles.css" />
</head>
<body>
  <header class="topbar" id="topbar">
    <div>
      <div class="cvl-brand">
        <span class="cvl-dot"></span>
        <span>WindowView Semantic Analysis</span>
      </div>
      <div class="cvl-subtitle">图片/CSV 提交、任务轮询、结果预览与下载</div>
    </div>
    <div class="actions">
      <a class="btn secondary" href="/workspace">返回 Workspace</a>
      <a class="btn secondary" href="/analysis/examples">示例说明</a>
    </div>
  </header>

  <main class="cvl-shell">
    <section class="cvl-card" style="padding:16px;">
      <h3 style="margin:0 0 10px;">后端连接</h3>
      <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
        <span class="item" style="border-radius:8px; border:1px solid #d4e0ed; padding:6px 10px; margin:0;">
          AI Base URL: <strong id="aiBaseUrlText">-</strong>
        </span>
        <button class="btn secondary" id="refreshHealthBtn">刷新健康状态</button>
      </div>
      <div class="status-line" id="healthStatus"></div>
    </section>

    <section class="cvl-card" style="padding:16px; margin-top:14px;">
      <h3 style="margin:0 0 10px;">提交分析任务</h3>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
        <div style="border:1px solid #d4e0ed; border-radius:10px; padding:12px;">
          <h4 style="margin:0 0 8px;">图片上传</h4>
          <div class="form-row">
            <label for="imageFiles">选择图片（可多选）</label>
            <input id="imageFiles" type="file" accept="image/*" multiple />
          </div>
          <button class="btn" id="submitImagesBtn">提交图片分析</button>
          <div class="status-line" id="imageStatus"></div>
        </div>
        <div style="border:1px solid #d4e0ed; border-radius:10px; padding:12px;">
          <h4 style="margin:0 0 8px;">CSV 上传</h4>
          <div class="form-row">
            <label for="csvFiles">选择 CSV 文件或文件夹</label>
            <input id="csvFiles" type="file" accept=".csv" multiple webkitdirectory directory />
          </div>
          <button class="btn" id="submitCsvBtn">提交 CSV 分析</button>
          <div class="status-line" id="csvStatus"></div>
        </div>
      </div>
    </section>

    <section class="cvl-card" style="padding:16px; margin-top:14px;">
      <h3 style="margin:0 0 10px;">任务队列</h3>
      <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:8px;">
        <button class="btn secondary" id="refreshQueueBtn">刷新队列</button>
        <button class="btn secondary" id="pollPendingBtn">轮询待完成任务</button>
        <span class="status-line" id="queueStatus"></span>
      </div>
      <div id="queueList" class="job-list" style="max-height:280px;"></div>
    </section>

    <section class="cvl-card" style="padding:16px; margin-top:14px;">
      <h3 style="margin:0 0 10px;">结果查看</h3>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
        <input id="jobIdInput" type="text" placeholder="输入 AI Job ID，例如 20260329_xxx" style="min-width:300px;" />
        <button class="btn secondary" id="queryJobBtn">查询状态</button>
        <button class="btn secondary" id="queryResultBtn">读取分析结果</button>
        <button class="btn secondary" id="downloadResultBtn">下载结果 JSON</button>
      </div>
      <div class="status-line" id="jobStatus"></div>

      <div id="resultMetrics" style="display:none; margin-top:10px; border:1px solid #d4e0ed; border-radius:10px; padding:10px;"></div>
      <div id="resultImages" style="display:none; margin-top:10px; gap:10px; grid-template-columns: 1fr 1fr;"></div>
      <pre id="jobResult" style="margin:10px 0 0; max-height:320px; overflow:auto; background:#f5f8fc; border:1px solid #d4e0ed; border-radius:8px; padding:10px;"></pre>
    </section>
  </main>

  <script type="module" src="/Apps/myapp/portal/analysis.js?v=20260329full"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("embed") === "1") {
      document.getElementById("topbar").style.display = "none";
      document.querySelector("main").style.paddingTop = "12px";
    }
  </script>
</body>
</html>
