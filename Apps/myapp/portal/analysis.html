<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WindowView Semantic Analysis</title>
  <link rel="stylesheet" href="/Apps/myapp/portal/styles.css" />
</head>
<body>
  <header class="topbar" id="topbar">
    <div>
      <div class="cvl-brand">
        <span class="cvl-dot"></span>
        <span>WindowView Semantic Analysis</span>
      </div>
      <div class="cvl-subtitle">调用 AI 后端进行语义分割与指标计算</div>
    </div>
    <div class="actions">
      <a class="btn secondary" href="/workspace">返回 Workspace</a>
    </div>
  </header>

  <main class="cvl-shell">
    <section class="cvl-card" style="padding:16px;">
      <h3 style="margin:0 0 10px;">上传图片批量分析</h3>
      <div class="form-row">
        <label for="imageFiles">选择图片（可多选）</label>
        <input id="imageFiles" type="file" accept="image/*" multiple />
      </div>
      <button class="btn" id="submitImagesBtn">提交图片分析</button>
      <div class="status-line" id="imageStatus"></div>
    </section>

    <section class="cvl-card" style="padding:16px; margin-top:14px;">
      <h3 style="margin:0 0 10px;">上传 CSV 批处理</h3>
      <div class="form-row">
        <label for="csvFiles">选择 CSV 文件或文件夹</label>
        <input id="csvFiles" type="file" accept=".csv" multiple webkitdirectory directory />
      </div>
      <button class="btn" id="submitCsvBtn">提交 CSV 分析</button>
      <div class="status-line" id="csvStatus"></div>
    </section>

    <section class="cvl-card" style="padding:16px; margin-top:14px;">
      <h3 style="margin:0 0 10px;">任务状态</h3>
      <div class="form-row" style="display:flex; gap:8px; align-items:center;">
        <input id="jobIdInput" type="text" placeholder="输入 job id，例如 20260327_xxx" />
        <button class="btn secondary" id="queryJobBtn">查询状态</button>
      </div>
      <div class="status-line" id="jobStatus"></div>
      <pre id="jobResult" style="margin:10px 0 0; max-height:300px; overflow:auto; background:#f5f8fc; border:1px solid #d4e0ed; border-radius:8px; padding:10px;"></pre>
    </section>
  </main>

  <script type="module" src="/Apps/myapp/portal/analysis.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("embed") === "1") {
      document.getElementById("topbar").style.display = "none";
      document.querySelector("main").style.paddingTop = "12px";
    }
  </script>
</body>
</html>
