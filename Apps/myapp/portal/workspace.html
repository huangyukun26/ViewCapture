<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityVisionLab | Workspace</title>
  <link rel="stylesheet" href="/Apps/myapp/portal/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="cvl-brand">
        <span class="cvl-dot"></span>
        <span>CityVisionLab Workspace</span>
      </div>
      <div class="cvl-subtitle" id="userInfo">Loading user...</div>
    </div>
    <div class="actions">
      <button class="btn danger" id="logoutBtn">退出登录</button>
    </div>
  </header>

  <main class="workspace-shell">
    <aside class="panel">
      <h3>Project 管理</h3>
      <div class="form-row">
        <label for="projectName">Project Name</label>
        <input id="projectName" type="text" maxlength="100" placeholder="例如: HKUSTGZ-W1-Facade-A" />
      </div>
      <div class="form-row">
        <label for="projectDescription">Description</label>
        <textarea id="projectDescription" rows="2" placeholder="可填写区域/楼栋/批次说明"></textarea>
      </div>
      <button class="btn" id="createProjectBtn">创建 Project</button>
      <div class="status-line" id="projectStatus"></div>
      <div class="project-list" id="projectList"></div>

      <h3 style="margin-top:14px;">任务记录</h3>
      <button class="btn secondary" id="refreshJobsBtn">刷新任务</button>
      <button class="btn secondary" id="createJobBtn">记录当前任务</button>
      <div class="status-line" id="jobStatus"></div>
      <div class="job-list" id="jobList"></div>
    </aside>

    <section class="workspace-main">
      <div class="main-toolbar">
        <strong>工作台</strong>
        <button class="btn" id="openAnnotationBtn">窗口标注</button>
        <button class="btn secondary" id="openCaptureBtn">批量拍照</button>
        <button class="btn secondary" id="openAnalysisBtn">语义分割</button>
        <button class="btn secondary" id="openAdminBtn" style="display:none;">管理后台</button>
        <span class="status-line" id="workspaceStatus"></span>
      </div>

      <div class="iframe-wrap iframe-stack">
        <iframe
          id="annotationFrame"
          class="tool-frame active"
          src="/annotation?embed=1"
          loading="eager"
        ></iframe>
        <iframe
          id="captureFrame"
          class="tool-frame"
          data-src="/capture?embed=1"
          src="about:blank"
          loading="lazy"
        ></iframe>
        <iframe
          id="analysisFrame"
          class="tool-frame"
          data-src="/analysis?embed=1"
          src="about:blank"
          loading="lazy"
        ></iframe>
        <iframe
          id="adminFrame"
          class="tool-frame"
          data-src="/admin?embed=1"
          src="about:blank"
          loading="lazy"
        ></iframe>
      </div>
    </section>
  </main>

  <script type="module" src="/Apps/myapp/portal/workspace.js?v=20260329p2fix1"></script>
</body>
</html>
