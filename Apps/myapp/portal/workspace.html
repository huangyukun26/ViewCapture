<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityVisionLab | Workspace</title>
  <link rel="stylesheet" href="/Apps/myapp/portal/styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <div class="cvl-brand">
        <span class="cvl-dot"></span>
        <span>CityVisionLab Workspace</span>
      </div>
      <div class="cvl-subtitle" id="userInfo">Loading user...</div>
    </div>
    <div class="actions">
      <a class="btn secondary" href="/portal">返回登录页</a>
      <button class="btn danger" id="logoutBtn">退出登录</button>
    </div>
  </header>

  <main class="workspace-shell">
    <aside class="panel">
      <h3>Project 管理</h3>
      <div class="form-row">
        <label for="projectName">Project Name</label>
        <input id="projectName" type="text" maxlength="100" placeholder="例如: HKUSTGZ-W1-Facade-A" />
      </div>
      <div class="form-row">
        <label for="projectDescription">Description</label>
        <textarea id="projectDescription" rows="2" placeholder="可填写区域/楼栋/批次说明"></textarea>
      </div>
      <button class="btn" id="createProjectBtn">创建 Project</button>
      <div class="status-line" id="projectStatus"></div>
      <div class="project-list" id="projectList"></div>

      <h3 style="margin-top:14px;">数据说明</h3>
      <div class="item" style="border:1px solid #d4e0ed; border-radius:10px; background:#fff;">
        CSV 统一采用浏览器本地选择文件/文件夹方式，不再依赖服务器 input 目录。
      </div>

      <h3 style="margin-top:14px;">任务记录</h3>
      <button class="btn secondary" id="refreshJobsBtn">刷新任务</button>
      <button class="btn secondary" id="createJobBtn">记录当前任务</button>
      <div class="status-line" id="jobStatus"></div>
      <div class="job-list" id="jobList"></div>
    </aside>

    <section class="workspace-main">
      <div class="main-toolbar">
        <strong>工具入口</strong>
        <button class="btn" id="openAnnotationBtn">标注模块</button>
        <button class="btn" id="openCaptureBtn">拍照模块</button>
        <button class="btn" id="openAnalysisBtn">语义分析</button>
        <button class="btn secondary" id="openAdminBtn" style="display:none;">管理后台</button>
        <button class="btn secondary" id="openAnnotationTabBtn">新标签打开标注</button>
        <button class="btn secondary" id="openCaptureTabBtn">新标签打开拍照</button>
        <button class="btn secondary" id="openAnalysisTabBtn">新标签打开语义分析</button>
        <button class="btn secondary" id="openAdminTabBtn" style="display:none;">新标签打开管理后台</button>
        <span class="status-line" id="workspaceStatus"></span>
      </div>
      <div class="iframe-wrap">
        <iframe id="toolFrame" src="/annotation?embed=1"></iframe>
      </div>
    </section>
  </main>

  <script type="module" src="/Apps/myapp/portal/workspace.js"></script>
</body>
</html>
