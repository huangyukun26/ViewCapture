<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityVisionLab Entry</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef3f9;
      color: #16304c;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card {
      border: 1px solid #d3dfeb;
      background: #ffffff;
      border-radius: 14px;
      padding: 24px;
      width: min(560px, 90vw);
      box-shadow: 0 12px 24px rgba(22, 48, 76, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 14px;
      color: #5e748a;
    }
    a {
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 10px;
      text-decoration: none;
      color: #fff;
      background: #2d6ea4;
      padding: 8px 12px;
      border-radius: 8px;
    }
    a.secondary {
      background: #f4f8fc;
      color: #16304c;
      border: 1px solid #d3dfeb;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>CityVisionLab</h1>
    <p>Use unified routes to avoid exposing legacy file paths.</p>
    <a href="/portal">Portal</a>
    <a href="/workspace">Workspace</a>
    <a class="secondary" href="/annotation">Annotation</a>
    <a class="secondary" href="/capture">Capture</a>
  </main>
</body>
</html>
